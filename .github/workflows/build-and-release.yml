name: Build & Release

on:
  push:
    branches: [master, expr/avalonia]
    tags:
      - 'v*'
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  PROJECT: BatteryNotifier.Avalonia/BatteryNotifier.Avalonia.csproj
  APP_NAME: BatteryNotifier
  APP_ID: com.batterynotifier.app

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: BatteryNotifier-win-x64
          - os: macos-latest
            rid: osx-arm64
            artifact: BatteryNotifier-osx-arm64
          - os: windows-latest
            rid: win-arm64
            artifact: BatteryNotifier-win-arm64
          - os: ubuntu-latest
            rid: linux-x64
            artifact: BatteryNotifier-linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
            artifact: BatteryNotifier-linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        run: >
          dotnet publish ${{ env.PROJECT }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishTrimmed=true
          -p:TrimMode=partial
          -p:IncludeNativeLibrariesForSelfExtract=false
          --output ./publish/${{ matrix.artifact }}

      # ── Install Velopack CLI ──
      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 0.0.1298

      # ── Extract version from tag or csproj ──
      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION=$(dotnet msbuild ${{ env.PROJECT }} -getProperty:Version -nologo)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ── Windows: Sign executable ──
      - name: Sign Windows executable
        if: startsWith(matrix.rid, 'win-') && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE) {
            Write-Host "Skipping signing — WINDOWS_CERTIFICATE secret not configured"
            exit 0
          }

          # Find signtool from Windows SDK
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*\x64\*" } |
            Sort-Object { $_.Directory.Name } -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) { throw "signtool.exe not found in Windows SDK" }

          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          try {
            $cert = [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
            [System.IO.File]::WriteAllBytes($certPath, $cert)

            $exePath = (Get-ChildItem -Path "./publish/${{ matrix.artifact }}" -Filter "BatteryNotifier.exe" -Recurse | Select-Object -First 1).FullName
            if (-not $exePath) { throw "BatteryNotifier.exe not found in publish output" }

            & $signtool sign /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD /tr https://timestamp.digicert.com /td sha256 /fd sha256 $exePath
            if ($LASTEXITCODE -ne 0) { throw "signtool exited with code $LASTEXITCODE" }
          } finally {
            if (Test-Path $certPath) { Remove-Item $certPath -Force }
          }

      # ── macOS: Sign and notarize ──
      - name: Sign macOS binary
        if: contains(matrix.rid, 'osx') && startsWith(github.ref, 'refs/tags/v')
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          P12_PATH=$RUNNER_TEMP/certificate.p12

          cleanup() {
            rm -f "$P12_PATH"
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          }
          trap cleanup EXIT

          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "Skipping signing — MACOS_CERTIFICATE secret not configured"
            exit 0
          fi

          # Create temporary keychain
          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$MACOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          # Find and validate binary
          BINARY=$(find ./publish/${{ matrix.artifact }} -name "BatteryNotifier" -type f | head -1)
          if [ -z "$BINARY" ]; then echo "ERROR: Binary not found in publish output"; exit 1; fi

          # Sign the binary
          codesign --force --options runtime --timestamp \
            --entitlements BatteryNotifier.Avalonia/Entitlements.plist \
            --sign "$MACOS_SIGNING_IDENTITY" "$BINARY"

          # Verify signature
          codesign --verify --deep --strict "$BINARY"

      - name: Notarize macOS binary
        if: contains(matrix.rid, 'osx') && startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ]; then
            echo "Skipping notarization — APPLE_ID secret not configured"
            exit 0
          fi

          BINARY=$(find ./publish/${{ matrix.artifact }} -name "BatteryNotifier" -type f | head -1)
          if [ -z "$BINARY" ]; then echo "ERROR: Binary not found in publish output"; exit 1; fi

          # Create ZIP for notarization
          ditto -c -k --keepParent "$BINARY" $RUNNER_TEMP/notarize.zip

          # Submit for notarization
          xcrun notarytool submit $RUNNER_TEMP/notarize.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

          # Staple the notarization ticket
          xcrun stapler staple "$BINARY" || true

          # Cleanup
          rm -f $RUNNER_TEMP/notarize.zip

      # ── Velopack: Create installers ──
      - name: Velopack pack (Windows)
        if: startsWith(matrix.rid, 'win-')
        shell: bash
        run: |
          vpk pack \
            --packId "${{ env.APP_NAME }}" \
            --packVersion "${{ steps.version.outputs.version }}" \
            --packDir "./publish/${{ matrix.artifact }}" \
            --mainExe "BatteryNotifier.exe" \
            --icon "BatteryNotifier.Avalonia/Assets/battery-notifier-logo.ico" \
            --outputDir "./installers/${{ matrix.artifact }}"

      - name: Velopack pack (macOS)
        if: contains(matrix.rid, 'osx')
        shell: bash
        run: |
          vpk pack \
            --packId "${{ env.APP_NAME }}" \
            --packVersion "${{ steps.version.outputs.version }}" \
            --packDir "./publish/${{ matrix.artifact }}" \
            --mainExe "BatteryNotifier" \
            --icon "BatteryNotifier.Avalonia/Assets/battery-notifier-logo.icns" \
            --outputDir "./installers/${{ matrix.artifact }}"

      - name: Velopack pack (Linux)
        if: contains(matrix.rid, 'linux-')
        shell: bash
        run: |
          vpk pack \
            --packId "${{ env.APP_NAME }}" \
            --packVersion "${{ steps.version.outputs.version }}" \
            --packDir "./publish/${{ matrix.artifact }}" \
            --mainExe "BatteryNotifier" \
            --outputDir "./installers/${{ matrix.artifact }}"

      # ── Linux: Build AppImage ──
      - name: Build AppImage
        if: contains(matrix.rid, 'linux-')
        shell: bash
        run: |
          # Determine architecture for appimagetool
          case "${{ matrix.rid }}" in
            linux-x64)   ARCH=x86_64 ;;
            linux-arm64) ARCH=aarch64 ;;
          esac

          # Install appimagetool
          curl -sL "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" -o appimagetool
          chmod +x appimagetool

          # Assemble AppDir
          APPDIR="${{ env.APP_NAME }}.AppDir"
          mkdir -p "$APPDIR/usr/bin"

          # Copy published output
          cp -r ./publish/${{ matrix.artifact }}/* "$APPDIR/usr/bin/"

          # Desktop file and icon at AppDir root (required by appimagetool)
          cp BatteryNotifier.Avalonia/Assets/BatteryNotifier.desktop "$APPDIR/"
          cp BatteryNotifier.Avalonia/Assets/BatteryNotifierLogo.png "$APPDIR/BatteryNotifier.png"

          # AppRun entry point
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          exec "$HERE/usr/bin/BatteryNotifier" "$@"
          APPRUN
          sed -i 's/^          //' "$APPDIR/AppRun"
          chmod +x "$APPDIR/AppRun"

          # Build AppImage (--appimage-extract-and-run avoids FUSE requirement in CI)
          ARCH=$ARCH ./appimagetool --appimage-extract-and-run "$APPDIR" \
            "./installers/${{ matrix.artifact }}/${{ env.APP_NAME }}-${{ matrix.rid }}.AppImage"

      # ── Upload portable artifact (zip/tarball) ──
      - name: Create Windows ZIP
        if: startsWith(matrix.rid, 'win-')
        shell: pwsh
        run: Compress-Archive -Path "./publish/${{ matrix.artifact }}/*" -DestinationPath "./publish/${{ matrix.artifact }}.zip"

      - name: Create macOS/Linux tarball
        if: "!startsWith(matrix.rid, 'win-')"
        run: tar -czf ./publish/${{ matrix.artifact }}.tar.gz -C ./publish/${{ matrix.artifact }} .

      - name: Upload portable artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: |
            ./publish/${{ matrix.artifact }}.zip
            ./publish/${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

      # ── Upload Velopack installer artifact ──
      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}-installer
          path: ./installers/${{ matrix.artifact }}/*
          if-no-files-found: warn

  # ── Create GitHub Release ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: ./artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -name "*.pkg" -o -name "*.AppImage" -o -name "*.nupkg" \) -exec sha256sum {} \; > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"

          # Delete any existing draft release for this tag (from a previous failed run)
          EXISTING=$(gh api repos/${{ github.repository }}/releases --jq ".[] | select(.tag_name == \"$TAG\" and .draft == true) | .id" 2>/dev/null || true)
          for ID in $EXISTING; do
            echo "Deleting stale draft release (ID: $ID)"
            gh api -X DELETE "repos/${{ github.repository }}/releases/$ID" || true
          done

          # Deduplicate installer filenames: Velopack produces identical names for
          # win-x64 and win-arm64 (e.g., BatteryNotifier-win-Setup.exe).
          # Inject the RID into the filename (Setup.exe → Setup-win-x64.exe).
          for dir in artifacts/*-installer; do
            [ -d "$dir" ] || continue
            # Extract RID: "BatteryNotifier-win-x64-installer" → "win-x64"
            RID=$(basename "$dir" | sed 's/^BatteryNotifier-//;s/-installer$//')
            for f in "$dir"/*; do
              [ -f "$f" ] || continue
              BASE=$(basename "$f")
              EXT="${BASE##*.}"
              NAME="${BASE%.*}"
              NEW="${NAME}-${RID}.${EXT}"
              mv "$f" "$dir/$NEW"
            done
          done

          # Collect all release assets using find (reliable, no globstar needed)
          FILES=()
          while IFS= read -r f; do
            FILES+=("$f")
          done < <(find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -name "*.pkg" -o -name "*.AppImage" -o -name "*.nupkg" -o -name "checksums-sha256.txt" \))

          echo "Found ${#FILES[@]} release assets:"
          if [ ${#FILES[@]} -gt 0 ]; then
            printf '  %s\n' "${FILES[@]}"
          else
            echo "ERROR: No release assets found"
            exit 1
          fi

          # Create draft release with auto-generated notes
          gh release create "$TAG" "${FILES[@]}" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            --draft

  # ── Winget: auto-submit package to microsoft/winget-pkgs ──
  winget:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    steps:
      - name: Submit to winget
        uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: Sandip124.BatteryNotifier
          installers-regex: 'Setup-win-x64\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
          release-tag: ${{ github.ref_name }}

  # ── Homebrew: update cask in personal tap ──
  homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: Sandip124/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update cask version and SHA
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from tag
          VERSION="${VERSION#v}"
          ASSET_URL="https://github.com/Sandip124/BatteryNotifier/releases/download/v${VERSION}/BatteryNotifier-osx-arm64.tar.gz"
          SHA256=$(curl -sL "$ASSET_URL" | shasum -a 256 | awk '{print $1}')

          cat > Casks/battery-notifier.rb << CASK
          cask "battery-notifier" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/Sandip124/BatteryNotifier/releases/download/v#{version}/BatteryNotifier-osx-arm64.tar.gz"
            name "BatteryNotifier"
            desc "Cross-platform battery monitoring and notification app"
            homepage "https://github.com/Sandip124/BatteryNotifier"

            depends_on macos: ">= :ventura"

            binary "BatteryNotifier"

            zap trash: [
              "~/Library/Application Support/BatteryNotifier",
              "~/Library/LaunchAgents/com.batterynotifier.plist",
            ]
          end
          CASK

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Casks/battery-notifier.rb

      - name: Commit and push
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git config user.name "Sandip Choudhary"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add Casks/battery-notifier.rb
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "Update BatteryNotifier to ${VERSION#v}"
          git push
